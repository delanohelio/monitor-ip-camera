<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor IP Camera</title>
  <link rel="stylesheet" href="style.css">
  <!-- hls.js: biblioteca de reprodução HLS para navegadores não-Safari -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title">📷 IP Camera Monitor</span>
        <div id="sidebar-header-actions">
          <button id="add-toggle-btn" class="icon-btn" type="button" title="Adicionar câmera">＋</button>
          <button id="fullscreen-btn" class="icon-btn" type="button" title="Tela cheia">⛶</button>
          <button id="collapse-btn" class="icon-btn" title="Recolher painel">◀</button>
        </div>
      </div>

      <div id="sidebar-content">
        <div id="add-section" hidden>
          <h2 class="section-title">Adicionar Câmera</h2>
          <form id="add-form" autocomplete="off" novalidate>
            <div class="field">
              <label for="f-name">Nome</label>
              <input type="text" id="f-name" placeholder="Câmera 1" maxlength="100">
            </div>
            <div class="field">
              <label for="f-ip">IP <span class="req">*</span></label>
              <input type="text" id="f-ip" value="192.168.1." placeholder="192.168.1.100" required maxlength="253">
            </div>
            <div class="field">
              <label for="f-login">Login <span class="req">*</span></label>
              <input type="text" id="f-login" value="admin" placeholder="admin" required maxlength="100">
            </div>
            <div class="field">
              <label for="f-pass">Senha <span class="req">*</span></label>
              <input type="password" id="f-pass" placeholder="••••••••" required maxlength="200" autocomplete="new-password">
            </div>
            <details class="advanced">
              <summary>Opções avançadas</summary>
              <div class="field">
                <label for="f-port">Porta RTSP</label>
                <input type="number" id="f-port" value="554" min="1" max="65535">
              </div>
              <div class="field">
                <label for="f-path">Caminho</label>
                <input type="text" id="f-path" value="/onvif1" maxlength="200">
              </div>
            </details>
            <button type="submit" id="add-btn">+ Adicionar</button>
          </form>
        </div>

        <div id="view-section">
          <h2 class="section-title">Visualização</h2>
          <div class="field">
            <label for="layout-mode">Layout das câmeras</label>
            <select id="layout-mode">
              <option value="auto">Automático</option>
              <option value="1x1">1 x 1</option>
              <option value="2x2">2 x 2</option>
              <option value="3x3">3 x 3</option>
              <option value="4x4">4 x 4</option>
            </select>
          </div>
          <div class="inline-actions">
            <button id="toggle-all-audio-btn" type="button">Ativar todos os áudios</button>
            <button id="reset-defaults-btn" type="button">Restaurar padrão</button>
          </div>
        </div>

        <div id="list-section">
          <h2 class="section-title">Câmeras <span id="cam-count">(0)</span></h2>
          <ul id="cam-list"></ul>
        </div>

        <div id="power-section">
          <h2 class="section-title">Economia de Energia</h2>
          <label class="check-row" for="audio-watch-enabled">
            <input type="checkbox" id="audio-watch-enabled">
            <span>Despertar com áudio</span>
          </label>
          <div class="noise-widget">
            <div class="noise-head">
              <span>Ruído</span>
              <span>
                <span id="noise-level-text">0%</span>
                <span class="noise-sep">|</span>
                <span class="noise-peak">Pico</span>
                <span id="noise-peak-text">0%</span>
              </span>
            </div>
            <div class="noise-bar">
              <div id="noise-level-fill"></div>
            </div>
          </div>
          <div class="field">
            <label for="audio-threshold">Limiar de áudio: <span id="audio-threshold-value">18</span></label>
            <input type="range" id="audio-threshold" min="2" max="80" step="1" value="18">
          </div>
          <button id="blackout-btn" type="button">Ativar Tela Preta</button>
          <p id="power-hint">Com a tela preta ativa, o vídeo volta automaticamente quando o áudio superar o limiar.</p>
        </div>
      </div>
    </aside>

    <!-- ── Main grid ── -->
    <main id="main">
      <button id="expand-btn" title="Abrir painel" hidden>▶</button>
      <div id="grid"></div>
    </main>

  </div>

  <div id="blackout-overlay" hidden>
    <div class="blackout-inner">
      <div class="noise-widget noise-widget-overlay">
        <div class="noise-head">
          <span>Ruído</span>
          <span>
            <span id="noise-level-text-overlay">0%</span>
            <span class="noise-sep">|</span>
            <span class="noise-peak">Pico</span>
            <span id="noise-peak-text-overlay">0%</span>
          </span>
        </div>
        <div class="noise-bar">
          <div id="noise-level-fill-overlay"></div>
        </div>
      </div>
      <button id="blackout-exit-btn" type="button">Mostrar Tela</button>
    </div>
  </div>

  <div id="edit-modal" hidden>
    <div class="edit-modal-card">
      <h2>Editar Câmera</h2>
      <form id="edit-form" autocomplete="off" novalidate>
        <div class="field">
          <label for="e-name">Nome</label>
          <input type="text" id="e-name" placeholder="Câmera" maxlength="100">
        </div>
        <div class="field">
          <label for="e-ip">IP <span class="req">*</span></label>
          <input type="text" id="e-ip" placeholder="192.168.1.100" required maxlength="253">
        </div>
        <div class="field">
          <label for="e-login">Login <span class="req">*</span></label>
          <input type="text" id="e-login" placeholder="admin" required maxlength="100">
        </div>
        <div class="field">
          <label for="e-pass">Senha <span class="req">*</span></label>
          <input type="password" id="e-pass" placeholder="••••••••" required maxlength="200" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="e-port">Porta RTSP</label>
          <input type="number" id="e-port" value="554" min="1" max="65535">
        </div>
        <div class="field">
          <label for="e-path">Caminho</label>
          <input type="text" id="e-path" value="/onvif1" maxlength="200">
        </div>
        <div class="edit-actions">
          <button id="edit-cancel-btn" type="button">Cancelar</button>
          <button id="edit-save-btn" type="submit">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
